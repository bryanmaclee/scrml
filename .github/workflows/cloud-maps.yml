# Cloud-maps CI — the S253 cloud-PA "beachhead" (build-first, lowest-risk seam).
#
# PURPOSE (docs/deep-dives ../scrml-support cloud-pa-gate-offload-2026-07-13 §6/§8 step 1): prove the
#   CLOUD-BOT-WRITES-TO-PROTECTED-MAIN seam + offload the maps/@generated bookkeeping the PA otherwise
#   pays by hand every wrap (maps drift ~130+ commits between manual refreshes).
#
# BRANCH-PROTECTION-AWARE (post-S254): main is protected (enforce_admins), so this NEVER pushes to main
#   directly. It opens a `maps/regen-*` PR and enables auto-merge. `gate` runs on the PR (ci.yml's
#   `pull_request:` trigger has NO path filter → fires on docs-only PRs) and passes (maps/@generated are
#   docs), then auto-merge stamps it (0 required approvals). NO branch-protection bypass — front door only.
#
# WHY A PAT (not default GITHUB_TOKEN): a PR opened by GITHUB_TOKEN does NOT trigger `gate`
#   ("events from GITHUB_TOKEN don't cascade") → auto-merge would wait forever on a gate that never fires.
#   A PAT-opened PR DOES fire gate. Needs a fine-grained PAT (Contents R/W + Pull-requests R/W on this repo)
#   as the `MAPS_PAT` secret. Until it exists a run reds at checkout — HARMLESS (this workflow is off the
#   required-checks list, it cannot block a merge). NB fine-grained PATs expire (≤1yr) → renew MAPS_PAT
#   before expiry or the bot goes dark.
#
# TWO STAGES: (1) deterministic `bun scripts/state.ts --write` (@generated rollup; zero AI cost) then
#   (2) the `project-mapper` agent (committed at .claude/agents/, force-added since .claude/ is gitignored)
#   regenerates .claude/maps/. Claude GitHub App (github.com/apps/claude) must be installed for step 2.

name: cloud-maps

on:
  workflow_dispatch: {}            # manual — use this to TEST the seam first
  schedule:
    - cron: "17 9 * * *"           # daily ~09:17 UTC — keeps maps ≤24h stale, predictable cost

concurrency:
  group: cloud-maps
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write          # claude-code-action (Stage 2) needs OIDC even with anthropic_api_key + the Claude App

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MAPS_PAT }}     # identity whose opened PR fires `gate` (GITHUB_TOKEN's wouldn't)
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Stage 1 — regenerate @generated state rollup (deterministic, no AI cost)
        run: bun scripts/state.ts --write

      - name: Stage 2 — regenerate nav-maps via the project-mapper agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: >-
            Use the project-mapper subagent in FULL_COLD_START mode to regenerate every file under
            .claude/maps/ from the current source and spec. Do not commit or push — only write the map
            files; the workflow lands them.
          claude_args: "--permission-mode acceptEdits --max-turns 40"

      - name: Open maps/@generated PR + enable auto-merge (only if drift)
        env:
          GH_TOKEN: ${{ secrets.MAPS_PAT }}
        run: |
          if [ -z "$(git status --porcelain -- .claude/maps master-list.md)" ]; then
            echo "No maps/@generated drift — nothing to land."; exit 0
          fi
          BR="maps/regen-${{ github.run_id }}"
          git config user.name  "scrml-maps-ci"
          git config user.email "scrml-maps-ci@users.noreply.github.com"
          git checkout -b "$BR"
          git add -f .claude/maps master-list.md      # -f: .claude/ is gitignored (maps are force-tracked)
          git commit -m "chore(maps): scheduled nav-map + @generated regen"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "chore(maps): scheduled regen" \
            --body "Automated maps + @generated regen (cloud-maps beachhead). \`gate\` runs on this PR; auto-merges on green. No branch-protection bypass."
          gh pr merge "$BR" --squash --auto --delete-branch
