# CI — the authoritative async gate (clean env). Never blocks a local push.
#
# Gate-layering (flogence gate-layering-methodology-2026-07-06 + scrml S242/S243; TUNED S253 cloud-PA arc):
#   types (always-on local) · pre-commit fast subset (unit+integration+conformance, ~2min, every commit)
#   · **CI (HERE) = the authoritative async gate** · R26 + adversarial /code-review (the PA's judgment).
#
# TWO jobs:
#   • gate     — BLOCKING. The GUARANTEED-GREEN core: unit + integration + conformance (the pre-commit
#                subset, proven green on every commit, no artifact deps) + the TodoMVC gauntlet. This is
#                the merge-gate. lsp/commands PROMOTE into gate once a `tracking` run confirms them green
#                on the clean runner.
#   • tracking — NON-BLOCKING (continue-on-error). lsp + commands (promotion candidates) + browser (has
#                REAL fails beyond env-whitespace, e.g. g-emit-lift-markup-text-interp) + the M6.x
#                within-node parser-parity backlog + canary. Visible, never blocks the gate.
#
# EXCLUDED from CI entirely: `compiler/tests/self-host` — it depends on a locally-built, gitignored dist
# that CANNOT be rebuilt on a clean checkout (the self-host `.scrml` sources don't compile against the
# current compiler: `null`, `!==`, `try` — the post-v1.0 self-host migration workstream, master-list B4).
# It passes locally only via a stale dist artifact; it is not a real merge-gate.
#
# WHY (S253): the prior ci.yml ran `bun test compiler/tests/` (EVERYTHING) → red on the M6.x within-node
# backlog + the un-rebuildable self-host dist. A gate red on known backlog can't be trusted to retire
# the redundant local pre-push full-suite (the wall-time). This gate == the guaranteed-green core; once
# confirmed green at origin, the local pre-push full-suite drops to the fast subset — the wall-time win.

name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'handOffs/**'
      - 'docs/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Populate browser-test fixtures (samples/compilation-tests/dist)
        run: bun run pretest
      - name: Gate suite (unit + integration + conformance)
        run: bun test compiler/tests/unit compiler/tests/integration compiler/tests/conformance
      - name: Gauntlet quick check (TodoMVC compiles + emitted JS parses)
        run: |
          bun run compiler/src/cli.js compile benchmarks/todomvc/app.scrml --convert-legacy-css
          node --check benchmarks/todomvc/dist/app.client.js

  tracking:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Populate browser-test fixtures
        run: bun run pretest
      - name: lsp + commands (promotion candidates — move to gate once green here)
        run: bun test compiler/tests/lsp compiler/tests/commands
      - name: Browser tests (real fails + env-whitespace — tracking)
        run: bun test compiler/tests/browser
      - name: Within-node parser-parity + canary (M6.x native-parser migration backlog — tracking)
        run: bun test compiler/tests/parser-conformance-within-node.test.js
