# CI — the authoritative async gate (clean env). Never blocks a local push.
#
# Gate-layering (flogence gate-layering-methodology-2026-07-06 + scrml S242/S243; TUNED S253 cloud-PA arc):
#   types (always-on local) · pre-commit fast subset (unit+integration+conformance, ~2min, every commit)
#   · **CI (HERE) = the authoritative async gate** · R26 + adversarial /code-review (the PA's judgment).
#
# THREE jobs:
#   • gate     — BLOCKING. The REPRODUCIBLY-GREEN-FROM-SOURCE core: unit + conformance (pure compiler
#                correctness + the language conformance suite; no dist/env deps) + the TodoMVC gauntlet.
#                This is the merge-gate. Promote integration/lsp/commands into gate once each confirms
#                green in `tracking` (integration needs self-host-smoke relocated/dist-guarded first).
#   • tracking — NON-BLOCKING (continue-on-error). integration (contains the dist-dependent
#                self-host-smoke) + lsp + commands + browser (REAL fails, e.g. g-emit-lift-markup-text-
#                interp) + the M6.x within-node parser-parity backlog + canary. Visible, never blocks.
#   • windows  — NON-BLOCKING (continue-on-error). unit + conformance on windows-latest — surfaces the
#                OS-path-separator regressions the Linux gate can't see (#25/#26 `\` vs `/`). Promote into
#                `gate` (windows-latest matrix) once green. The owed Windows-CI runner (4th+ OS-path report).
#
# KEY FINDING (S253): the local "full gate" (pre-push) partly PASSES ON UN-REPRODUCIBLE LOCAL ARTIFACTS —
# the self-host tests (`compiler/tests/self-host` AND `integration/self-host-smoke.test.js`) need a
# locally-built, gitignored dist that CANNOT be rebuilt on a clean checkout (the self-host `.scrml`
# sources don't compile against the current compiler: `null`/`!==`/`try` — the post-v1.0 self-host
# migration, master-list B4). A trustworthy cloud gate can only include what's reproducibly green from
# source; self-host + the M6.x within-node backlog + browser env-fails are tracked, not gated.
#
# WHY (S253): the prior ci.yml ran `bun test compiler/tests/` (EVERYTHING) → red on the M6.x within-node
# backlog + the un-rebuildable self-host dist. A gate red on known backlog can't be trusted to retire
# the redundant local pre-push full-suite (the wall-time). This gate == the guaranteed-green core; once
# confirmed green at origin, the local pre-push full-suite drops to the fast subset — the wall-time win.

name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'handOffs/**'
      - 'docs/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Populate browser-test fixtures (samples/compilation-tests/dist)
        run: bun run pretest
      - name: Gate suite (unit + conformance — reproducibly green from source)
        run: bun test compiler/tests/unit compiler/tests/conformance
      - name: Gauntlet quick check (TodoMVC compiles + emitted JS parses)
        run: |
          bun run compiler/src/cli.js compile benchmarks/todomvc/app.scrml --convert-legacy-css
          node --check benchmarks/todomvc/dist/app.client.js
      - name: Snippet gate (every public-cited .scrml still compiles)
        run: bun scripts/snippet-gate.js

  tracking:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Populate browser-test fixtures
        run: bun run pretest
      - name: integration + lsp + commands (promotion candidates — integration needs self-host-smoke dist-guarded)
        run: bun test compiler/tests/integration compiler/tests/lsp compiler/tests/commands
      - name: Browser tests (real fails + env-whitespace — tracking)
        run: bun test compiler/tests/browser
      - name: Within-node parser-parity + canary (M6.x native-parser migration backlog — tracking)
        run: bun test compiler/tests/parser-conformance-within-node.test.js

  windows:
    # NON-BLOCKING (continue-on-error) — surfaces OS-path-separator regressions on every PR without gating
    # merges on a currently-imperfect Windows state. scrml's compiler has repeated Windows path-sensitivity
    # bugs (issue #25 nested-pages prefix, #26 isStdlibFilePath auth-bypass — both `\` vs `/`), invisible on
    # the Linux `gate`. Runs the dist-independent core (unit + conformance — "reproducibly green from source,
    # no dist/env deps") on windows-latest so a Windows-only classifier/path bug goes RED here, visibly.
    # Promote into the blocking `gate` (add windows-latest to a matrix) once this is confirmed green.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Unit + conformance on Windows (catches `\` vs `/` OS-path bugs — #25/#26 class)
        run: bun test compiler/tests/unit compiler/tests/conformance
